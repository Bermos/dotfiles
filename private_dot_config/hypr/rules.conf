# ═══════════════════════════════════════════════════════════════════════════
# WINDOW RULES (Hyprland 0.53+ syntax)
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# FLOATING WINDOWS
# ───────────────────────────────────────────────────────────────────────────

# Picture-in-Picture
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, size 800 450
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, opacity 0.95

# Firefox PiP specifically
windowrule = match:title ^(Picture-in-Picture|Firefox)$, float on
windowrule = match:title ^(Picture-in-Picture|Firefox)$, size 800 450
windowrule = match:title ^(Picture-in-Picture|Firefox)$, pin on

# Common dialogs
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:title ^(Open File)$, float on
windowrule = match:title ^(Save File)$, float on
windowrule = match:title ^(Open Folder)$, float on

# File pickers - float, size, and force to active workspace
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, size 1000 600
windowrule = match:class ^(xdg-desktop-portal-gtk)$, workspace r

# Polkit authentication dialogs - keep on active workspace
windowrule = match:class ^(polkit-gnome-authentication-dialog|org.gnome.polkit.AuthenticationDialog)$, float on
windowrule = match:class ^(polkit-gnome-authentication-dialog|org.gnome.polkit.AuthenticationDialog)$, workspace r

# ───────────────────────────────────────────────────────────────────────────
# OPACITY RULES (LCARS glassy aesthetic)
# ───────────────────────────────────────────────────────────────────────────

# Terminals - slight transparency for glassy look
windowrule = match:class ^(kitty)$, opacity 0.92 0.88
windowrule = match:class ^(Alacritty)$, opacity 0.92 0.88
windowrule = match:class ^(foot)$, opacity 0.92 0.88

# Code editors - keep opaque for clarity
windowrule = match:class ^(Code|code-url-handler)$, opacity 1.0
windowrule = match:class ^(jetbrains-.*)$, opacity 1.0

# File managers - slight transparency
windowrule = match:class ^(thunar|Thunar)$, opacity 0.94 0.90
windowrule = match:class ^(nautilus)$, opacity 0.94 0.90
windowrule = match:class ^(dolphin)$, opacity 0.94 0.90

# Browsers - opaque
windowrule = match:class ^(firefox)$, opacity 1.0
windowrule = match:class ^(chromium)$, opacity 1.0

# Discord - slight transparency
windowrule = match:class ^(discord)$, opacity 0.94 0.90
windowrule = match:class ^(WebCord)$, opacity 0.94 0.90

# ───────────────────────────────────────────────────────────────────────────
# GAMING RULES (optional - uncomment if needed)
# ───────────────────────────────────────────────────────────────────────────

# Gamescope - for running games in a contained window
# windowrule = match:class ^(gamescope)$, no_border on
# windowrule = match:class ^(gamescope)$, tile on
# windowrule = match:class ^(gamescope)$, size 3440 1440
# windowrule = match:class ^(gamescope)$, move 0 0

# Steam windows
