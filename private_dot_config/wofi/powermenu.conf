# ═══════════════════════════════════════════════════════════════════════════
# COMPACT POWER MENU - WOFI DMENU CONFIG
# ═══════════════════════════════════════════════════════════════════════════

show=dmenu
prompt=Power
width=250
height=265
location=center
orientation=vertical
halign=fill
line_wrap=off
dynamic_lines=false

# Matching
allow_markup=true
insensitive=true

# Display
hide_scroll=true
no_actions=true
columns=1
lines=5

# Keys
key_exit=Escape

# Layer
layer=overlay
